<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snek">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href='data:application/manifest+json,{"name":"Snek","short_name":"Snek","display":"standalone","background_color":"%230a0a0a","theme_color":"%230a0a0a","start_url":".","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 viewBox%3D%220 0 100 100%22%3E%3Crect width%3D%22100%22 height%3D%22100%22 fill%3D%22%230a0a0a%22%2F%3E%3Ccircle cx%3D%2250%22 cy%3D%2250%22 r%3D%2240%22 fill%3D%22%2339ff14%22%2F%3E%3C%2Fsvg%3E","sizes":"any","type":"image/svg+xml"}]}'>  <title>Snek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #39ff14;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 8px;
      padding: 12px;
      user-select: none;
      -webkit-user-select: none;
    }

    h1 { font-size: clamp(1.4rem, 5vw, 2rem); letter-spacing: 6px; text-shadow: 0 0 14px #39ff14; }

    #scores { display: flex; gap: 28px; font-size: clamp(0.8rem, 3vw, 1rem); }

    #fx { display: flex; gap: 8px; min-height: 22px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .fx-tag {
      font-size: 0.68rem;
      padding: 1px 7px;
      border-radius: 4px;
      border: 1px solid;
      letter-spacing: 1px;
    }

    #canvas-wrap { position: relative; }

    canvas { display: block; border: 2px solid #39ff14; box-shadow: 0 0 24px #39ff1444; }

    #overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,10,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { font-size: clamp(1.4rem, 6vw, 2.2rem); text-shadow: 0 0 12px #39ff14; }
    #overlay p  { font-size: clamp(0.9rem, 3vw, 1.1rem); }

    button {
      background: transparent; border: 2px solid #39ff14; color: #39ff14;
      font-family: inherit; font-size: clamp(0.85rem, 3vw, 1rem);
      padding: 8px 28px; cursor: pointer; letter-spacing: 3px;
      text-shadow: 0 0 6px #39ff14; box-shadow: 0 0 14px #39ff1444;
      transition: background 0.15s;
    }
    button:hover, button:focus { background: #39ff1422; outline: none; }

    #dpad { display: grid; grid-template: repeat(3, 54px) / repeat(3, 54px); gap: 4px; }
    .dp {
      display: flex; align-items: center; justify-content: center;
      background: #111; border: 1px solid #39ff1466; border-radius: 8px;
      font-size: 1.4rem; color: #39ff14; cursor: pointer;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .dp:active { background: #39ff1422; }
    @media (hover: hover) and (pointer: fine) { #dpad { display: none; } }

    #rules {
      font-size: 0.7rem;
      color: #39ff1499;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    #rules b { color: #39ff14bb; }
  </style>
</head>
<body>

  <h1>SNEK</h1>
  <div id="scores">
    <span>SCORE &nbsp;<b id="score">0</b></span>
    <span>BEST &nbsp;<b id="hi">0</b></span>
  </div>
  <div id="fx"></div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay" class="hidden">
      <h2>GAME OVER</h2>
      <p>Score: <span id="final">0</span></p>
      <button id="btn">PLAY AGAIN</button>
    </div>
  </div>

  <div id="dpad">
    <div></div><div class="dp" data-d="up">▲</div><div></div>
    <div class="dp" data-d="left">◀</div><div></div><div class="dp" data-d="right">▶</div>
    <div></div><div class="dp" data-d="down">▼</div><div></div>
  </div>

  <div id="rules">
    <b>↑ ↓ ← →</b> or <b>WASD</b> to move &nbsp;·&nbsp; eat <b style="color:#ff3333bb">●</b> to grow &nbsp;·&nbsp; don't bite yourself<br>
    <b style="color:#ffdd00bb">!!</b> speed &nbsp;·&nbsp; <b style="color:#00ffff99">&gt;&lt;</b> shrink &nbsp;·&nbsp; <b style="color:#ff44ffbb">2x</b> double points &nbsp;·&nbsp; chain eats for a combo
  </div>

  <script>
    const COLS = 20, ROWS = 20;
    const BASE_MS = 160, MIN_MS = 65, ACCEL = 3;

    const canvas  = document.getElementById('c');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const fxEl    = document.getElementById('fx');
    const scoreEl = document.getElementById('score');
    const hiEl    = document.getElementById('hi');
    const finalEl = document.getElementById('final');

    function resize() {
      const a = Math.min(window.innerWidth - 24, window.innerHeight - 250, 500);
      canvas.width = canvas.height = Math.floor(a / COLS) * COLS;
    }
    resize();
    window.addEventListener('resize', () => { resize(); if (!alive) draw(); });
    const cell = () => canvas.width / COLS;

    let _ac = null;
    const ac = () => _ac || (_ac = new (window.AudioContext || window.webkitAudioContext)());

    function beep(freq, dur, vol = 0.25, wave = 'square') {
      try {
        const a = ac(), o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.type = wave; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
        o.start(); o.stop(a.currentTime + dur);
      } catch (_) {}
    }

    const sfx = {
      eat:   ()  => beep(440, 0.07),
      pu:    ()  => { beep(660, 0.08); setTimeout(() => beep(880, 0.12), 70); },
      death: ()  => { beep(220, 0.1); setTimeout(() => beep(160, 0.13), 110); setTimeout(() => beep(100, 0.28, 0.35), 230); },
      combo: (n) => beep(330 + n * 110, 0.07, 0.2),
    };

    const PU = {
      speed:  { color: '#ffdd00', glow: '#ffaa00', icon: '!!', label: '⚡ FAST',  ttl: 6000 },
      shrink: { color: '#00ffff', glow: '#00aaff', icon: '><', label: '✂ SHRINK', ttl: 0    },
      multi:  { color: '#ff44ff', glow: '#cc00ff', icon: '2x', label: '✦ 2×',     ttl: 8000 },
    };
    const PU_KEYS = Object.keys(PU);

    let snake, dir, queued, food, score, hi, timer, alive;
    let pu = null, effects = {}, combo = 0, lastEat = 0, flash = null;

    hi = +(localStorage.getItem('snek-hi') || 0);
    hiEl.textContent = hi;

    function placeFood() {
      const occ = new Set(snake.map(s => s.x + ',' + s.y));
      if (pu) occ.add(pu.x + ',' + pu.y);
      let f;
      do { f = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 }; }
      while (occ.has(f.x + ',' + f.y));
      food = f;
    }

    function maybeSpawnPu() {
      if (pu || Math.random() > 0.28) return;
      const occ = new Set(snake.map(s => s.x + ',' + s.y));
      occ.add(food.x + ',' + food.y);
      let p;
      do { p = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 }; }
      while (occ.has(p.x + ',' + p.y));
      pu = { ...p, type: PU_KEYS[Math.floor(Math.random() * PU_KEYS.length)], exp: Date.now() + 9000 };
    }

    function startGame() {
      clearTimeout(timer);
      snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir     = queued = { x: 1, y: 0 };
      score   = combo  = 0; lastEat = 0;
      pu = null; effects = {}; flash = null; alive = true;
      scoreEl.textContent = 0;
      overlay.classList.add('hidden');
      placeFood(); tick();
    }

    function tick() {
      dir = { ...queued };
      const head = {
        x: (snake[0].x + dir.x + COLS) % COLS,
        y: (snake[0].y + dir.y + ROWS) % ROWS,
      };
      if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();
      snake.unshift(head);
      const now = Date.now();
      if (pu && now > pu.exp) pu = null;
      if (pu && head.x === pu.x && head.y === pu.y) {
        const type = pu.type; pu = null; sfx.pu();
        if (type === 'speed')  effects.speed = now + PU.speed.ttl;
        if (type === 'multi')  effects.multi = now + PU.multi.ttl;
        if (type === 'shrink') {
          snake.splice(Math.max(3, Math.ceil(snake.length / 2)));
          flash = { text: 'SHRINK!', color: '#00ffff', until: now + 950 };
        }
      }
      if (head.x === food.x && head.y === food.y) {
        combo   = (now - lastEat < 2500 && combo > 0) ? Math.min(combo + 1, 5) : 1;
        lastEat = now;
        const pts = combo * (effects.multi && now < effects.multi ? 2 : 1);
        score += pts; scoreEl.textContent = score;
        if (score > hi) { hi = score; hiEl.textContent = hi; localStorage.setItem('snek-hi', hi); }
        if (combo > 1) { flash = { text: `×${combo} COMBO  +${pts}`, color: '#ffdd00', until: now + 900 }; sfx.combo(combo); }
        else sfx.eat();
        placeFood(); maybeSpawnPu();
      } else { snake.pop(); }
      draw();
      const base = Math.max(MIN_MS, BASE_MS - score * ACCEL);
      timer = setTimeout(tick, (effects.speed && now < effects.speed) ? Math.max(MIN_MS, base * 0.55 | 0) : base);
    }

    function endGame() {
      alive = false; sfx.death();
      finalEl.textContent = score;
      overlay.classList.remove('hidden'); draw();
    }

    function draw() {
      const W = canvas.width, C = cell(), now = Date.now();
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, W, W);
      ctx.strokeStyle = '#161616'; ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i*C, 0); ctx.lineTo(i*C, W); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*C); ctx.lineTo(W, i*C); ctx.stroke();
      }
      ctx.shadowColor = '#ff2020'; ctx.shadowBlur = 16; ctx.fillStyle = '#ff3333';
      ctx.beginPath(); ctx.arc(food.x*C+C/2, food.y*C+C/2, C/2-1, 0, Math.PI*2); ctx.fill();
      if (pu) {
        const def = PU[pu.type], pulse = 0.65 + 0.35 * Math.sin(now / 200);
        const cx = pu.x*C+C/2, cy = pu.y*C+C/2, r = C/2-1;
        ctx.shadowColor = def.glow; ctx.shadowBlur = 16*pulse;
        ctx.fillStyle = def.color; ctx.globalAlpha = 0.7+0.3*pulse;
        ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy); ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy); ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.fillStyle = '#000'; ctx.font = `bold ${Math.max(6,C*0.34)|0}px monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(def.icon, cx, cy);
      }
      snake.forEach((seg, i) => {
        ctx.shadowColor = '#39ff14'; ctx.shadowBlur = i===0 ? 20 : 8;
        ctx.fillStyle = i===0 ? '#90ff55' : '#39ff14';
        ctx.fillRect(seg.x*C+1, seg.y*C+1, C-2, C-2);
      });
      ctx.shadowBlur = 0;
      if (flash && now < flash.until) {
        ctx.globalAlpha = Math.min(1,(flash.until-now)/400);
        ctx.fillStyle = flash.color; ctx.shadowColor = flash.color; ctx.shadowBlur = 12;
        ctx.font = `bold ${Math.round(C*0.85)}px monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(flash.text, W/2, W/2);
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      }
      const tags = [];
      if (effects.speed && now < effects.speed) tags.push(`<span class="fx-tag" style="color:#ffdd00;border-color:#ffdd00">⚡ ${((effects.speed-now)/1000).toFixed(1)}s</span>`);
      if (effects.multi && now < effects.multi) tags.push(`<span class="fx-tag" style="color:#ff44ff;border-color:#ff44ff">✦ 2× ${((effects.multi-now)/1000).toFixed(1)}s</span>`);
      fxEl.innerHTML = tags.join('');
    }

    function steer(d) { if (d.x !== -dir.x || d.y !== -dir.y) queued = d; }
    const KEYS = { ArrowUp:{x:0,y:-1},w:{x:0,y:-1},ArrowDown:{x:0,y:1},s:{x:0,y:1},ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},ArrowRight:{x:1,y:0},d:{x:1,y:0} };
    document.addEventListener('keydown', e => {
      const d = KEYS[e.key]; if (d) { e.preventDefault(); steer(d); }
      if ((e.key==='Enter'||e.key===' ') && !alive) startGame();
    });
    const DMAP = { up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0} };
    document.querySelectorAll('.dp').forEach(btn => {
      const go = () => steer(DMAP[btn.dataset.d]);
      btn.addEventListener('touchstart', e => { e.preventDefault(); go(); }, {passive:false});
      btn.addEventListener('click', go);
    });
    let t0 = null;
    canvas.addEventListener('touchstart', e => { t0 = e.touches[0]; }, {passive:true});
    canvas.addEventListener('touchend', e => {
      if (!t0) return;
      const dx = e.changedTouches[0].clientX-t0.clientX, dy = e.changedTouches[0].clientY-t0.clientY;
      if (Math.max(Math.abs(dx),Math.abs(dy))>20)
        steer(Math.abs(dx)>Math.abs(dy)?(dx>0?{x:1,y:0}:{x:-1,y:0}):(dy>0?{x:0,y:1}:{x:0,y:-1}));
      t0=null;
    }, {passive:true});
    document.getElementById('btn').addEventListener('click', startGame);
    startGame();
  </script>
</body>
</html>
